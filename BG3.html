// ============== NEW: Random-blank mode toggle =================
const RANDOMIZE_BLANKS = true;

// ============== Helpers for random blanks =====================

// Common words we don't want to blank (articles, preps, etc.)
const STOPWORDS = new Set([
  "the","a","an","and","or","of","to","in","on","at","by","for","with","as","is","are","was","were",
  "be","been","being","that","this","those","these","it","its","into","out","from","than","then",
  "within","between","over","under","up","down","not","no","do","does","did","should","must","can",
  "could","would","will","may","might","if","when","while","after","before","about","approximately"
]);

// Treat number+unit combos as a single token (e.g., "150 psi", "6-liter", "4-8 bar", "+40 and +80", "1 mbar/min")
const UNIT_PATTERNS = [
  /\b\d+(?:\.\d+)?\s?(?:psi|bar|mbar|mbar\/min|L\/min|liters?|degree\s?C|hours?|mm)\b/gi,
  /\b[+-]?\d+(?:\s?(?:and|-)\s?[+-]?\d+)\b/gi,  // ranges like "+40 and +80", "4-8"
  /\b\d+(?:-\w+)\b/gi,                         // "6-liter"
  /\b[A-Z]{1,}[A-Za-z0-9-]*\b/g               // Tokens like RZ-25, ECU, FPS, DRAGERSORB
];

// Build a set of “blankable” tokens from a sentence.
// We prioritize: (1) multi-word phrases (original k), (2) matched unit tokens, (3) meaningful single words.
function extractBlankableTokens(statement) {
  const s = statement.s;
  const tokens = new Set();

  // Always try the original key first if present in the text
  if (s.includes(statement.k)) {
    tokens.add(statement.k);
  }

  // Add unit-like or device-like tokens
  UNIT_PATTERNS.forEach(p => {
    const matches = s.match(p);
    if (matches) matches.forEach(m => tokens.add(m.trim()));
  });

  // Add capitalized multi-word phrases that likely matter (e.g., "Connect ECU", "BG-ProAir")
  const phrasePattern = /\b([A-Z][A-Za-z0-9+-]*(?:\s+[A-Z][A-Za-z0-9+-]*)+)\b/g;
  let pm;
  while ((pm = phrasePattern.exec(s)) !== null) {
    tokens.add(pm[1].trim());
  }

  // Add meaningful single words (length >= 3, not stopwords, strip punctuation)
  s.split(/\s+/).forEach(w => {
    const clean = w.replace(/[.,()/:;[\]]+$/g, "").replace(/^[([:;]+/g, "");
    const lc = clean.toLowerCase();
    if (clean && clean.length >= 3 && !STOPWORDS.has(lc)) {
      tokens.add(clean);
    }
  });

  // Filter out very short or trivial leftovers again
  return Array.from(tokens).filter(t => t && t.length >= 2);
}

// Replace the chosen token with a fixed-length blank keeping punctuation around it.
// If the token appears multiple times, only the first instance is replaced (keeps difficulty fair).
function makeCloze(sentence, token) {
  // Escape token for regex
  const esc = token.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  // Allow token to be followed by punctuation without swallowing it
  const re = new RegExp(`\\b${esc}\\b(?!-)`, ''); // basic word boundary
  let replaced = false;
  const result = sentence.replace(re, (match) => {
    if (replaced) return match;
    replaced = true;
    // Preserve approximate length to hint difficulty
    const len = Math.max(5, Math.min(12, token.length));
    return "▯".repeat(Math.ceil(len / 2)); // visual blank box chars
  });
  return replaced ? result : null;
}

// Generate choices for a token using other words from the sentence as distractors.
// Fallback to the original d[] if we can't source enough distractors.
function buildChoices(statement, token) {
  const s = statement.s;
  const words = Array.from(
    new Set(
      s
        .split(/\s+/)
        .map(w => w.replace(/[.,()/:;[\]]+$/g, "").replace(/^[([:;]+/g, "").trim())
        .filter(w => !!w && w.toLowerCase() !== token.toLowerCase())
    )
  );

  // Prefer distractors that are similar length to token
  const nearLen = words.filter(w => Math.abs(w.length - token.length) <= 3 && w.toLowerCase() !== token.toLowerCase());
  const pool = nearLen.length >= 3 ? nearLen : words;

  let distractors = [];
  // Avoid obviously wrong tiny words
  distractors = pool
    .filter(w => w.length >= Math.min(3, token.length))
    .filter(w => w.toLowerCase() !== token.toLowerCase())
    .slice(0, 10);

  // Randomly sample up to 3 distractors
  distractors = shuffle(distractors).slice(0, 3);

  // If we still don't have 3, supplement from original d[]
  if (distractors.length < 3 && Array.isArray(statement.d)) {
    const add = statement.d.filter(x => x.toLowerCase() !== token.toLowerCase());
    distractors = distractors.concat(add.slice(0, 3 - distractors.length));
  }

  // Ensure unique and max 3 distractors
  distractors = Array.from(new Set(distractors)).slice(0, 3);

  // If still short (edge case), fill with generic decoys
  const GENERIC_DECOYS = ["component", "valve", "pressure", "oxygen", "system", "sensor"];
  while (distractors.length < 3) {
    const pick = GENERIC_DECOYS[Math.floor(Math.random() * GENERIC_DECOYS.length)];
    if (!distractors.includes(pick) && pick.toLowerCase() !== token.toLowerCase()) distractors.push(pick);
  }

  const choices = shuffle([token, ...distractors]);
  return choices;
}

function shuffle(arr) {
  return arr
    .map(v => ({ v, r: Math.random() }))
    .sort((a, b) => a.r - b.r)
    .map(({ v }) => v);
}

// ================= Existing quiz logic (with small changes) =================

let sessionDeck = [], streak = 0, timerRef, totalStartTime, activeQ, historyLog = [];
let audioCtx, alarmNextTime = 0;

window.onload = updateLeaderboardDisplay;

// WEB AUDIO ALARM
function playBeep(freq, duration) {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function initSession() {
    if(audioCtx) audioCtx.resume();
    streak = 0; historyLog = []; totalStartTime = Date.now();
    // Deep-copy and shuffle deck
    sessionDeck = JSON.parse(JSON.stringify(rawStatements)).sort(() => Math.random() - 0.5);

    // ========== NEW: Precompute randomized blanks and choices for this session ==========
    if (RANDOMIZE_BLANKS) {
      sessionDeck = sessionDeck.map(q => {
        const candidates = extractBlankableTokens(q);
        let token = q.k; // fallback to original key
        if (candidates.length) {
          token = candidates[Math.floor(Math.random() * candidates.length)];
        }
        const cloze = makeCloze(q.s, token) || q.s.replace(q.k, "__________"); // fallback replacement
        const choices = buildChoices(q, token);

        return {
          ...q,
          _blankToken: token,
          _cloze: cloze,
          _choices: choices
        };
      });
    }

    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('end-screen').classList.add('hidden');
    document.getElementById('game-ui').classList.remove('hidden');
    nextQ();
}

function nextQ() {
    document.body.classList.remove('flashing-bg');
    document.getElementById('quiz-container').classList.remove('shaking');
    document.getElementById('timer-fill').classList.remove('critical-timer');

    if (sessionDeck.length === 0) {
        const totalDuration = ((Date.now() - totalStartTime) / 1000).toFixed(2);
        saveBestTime(totalDuration);
        endSession("PERFECT SCORE: CERTIFIED", totalDuration);
        return;
    }

    activeQ = sessionDeck[0];
    const qTextEl = document.getElementById('q-text');

    if (RANDOMIZE_BLANKS) {
      qTextEl.innerText = activeQ._cloze;
    } else {
      qTextEl.innerText = activeQ.s.replace(activeQ.k, "__________");
    }

    document.getElementById('streak-val').innerText = streak;

    const container = document.getElementById('options-box');
    container.innerHTML = '';

    const choices = RANDOMIZE_BLANKS ? activeQ._choices : shuffle([...activeQ.d, activeQ.k]);

    choices.forEach(c => {
        const b = document.createElement('button');
        b.innerText = c;
        b.onclick = () => verify(c);
        container.appendChild(b);
    });

    runTimer();
}

function runTimer() {
    clearInterval(timerRef);
    let limit = Math.max(6, 20 - (Math.floor(streak / 15) * 4));
    let t = limit;
    alarmNextTime = 0;

    timerRef = setInterval(() => {
        t -= 0.1;
        document.getElementById('timer-text').innerText = Math.max(0, t).toFixed(1);
        document.getElementById('timer-fill').style.width = (t / limit * 100) + "%";

        // 5s ALARM LOGIC
        if (t <= 5 && t > 0) {
            const interval = t <= 2 ? 0.25 : 0.5; // Speed up alarm at 2s
            if (Date.now() > alarmNextTime) {
                playBeep(t <= 2 ? 1200 : 800, 0.1);
                alarmNextTime = Date.now() + (interval * 1000);
            }
        }

        // 3s VISUAL PANIC
        if (t <= 3 && t > 0) {
            document.body.classList.add('flashing-bg');
            document.getElementById('quiz-container').classList.add('shaking');
            document.getElementById('timer-fill').classList.add('critical-timer');
        }

        if (t <= 0) {
            clearInterval(timerRef);
            endSession("TIME EXPIRED");
        }
    }, 100);
}

function verify(choice) {
    clearInterval(timerRef);
    let isCorrect = false;

    if (RANDOMIZE_BLANKS) {
      isCorrect = (choice === activeQ._blankToken);
    } else {
      isCorrect = (choice === activeQ.k);
    }

    if (isCorrect) {
        streak++;
        sessionDeck.shift();
        nextQ();
    } else {
        endSession("INCORRECT SELECTION");
    }
}

function endSession(reason, finalTime = null) {
    document.body.classList.remove('flashing-bg');
    document.getElementById('quiz-container').classList.remove('shaking');
    document.getElementById('game-ui').classList.add('hidden');
    document.getElementById('end-screen').classList.remove('hidden');
    document.getElementById('final-streak').innerText = streak;
    document.getElementById('fail-reason').innerText = reason;
    document.getElementById('total-time-display').innerText = finalTime ? `Total Time: ${finalTime}s` : "";
    
    const title = document.getElementById('end-title');
    title.innerText = (streak === 77) ? "CERTIFICATION GRANTED" : "SESSION TERMINATED";
    title.style.color = (streak === 77) ? "#00ff99" : "#ff4444";
    if(streak < 77) playBeep(200, 0.5); // Fail tone
}

function saveBestTime(time) {
    let bestTimes = JSON.parse(localStorage.getItem('bgProAirBestTimes')) || [];
    bestTimes.push(parseFloat(time));
    bestTimes.sort((a, b) => a - b);
    localStorage.setItem('bgProAirBestTimes', JSON.stringify(bestTimes.slice(0, 3)));
    updateLeaderboardDisplay();
}

function updateLeaderboardDisplay() {
    const bestTimes = JSON.parse(localStorage.getItem('bgProAirBestTimes')) || [];
    document.getElementById('best-times-list').innerText =
      bestTimes.length ? bestTimes.map((t, i) => `${i+1}. ${t}s`).join(" | ") : "No Records";
}

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log("ProAir Offline Mode: Active"))
      .catch((err) => console.log("Offline Setup Failed", err));
  }
</script>
