<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG-ProAir: P2P BATTLE MODE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #00ff99; --danger: #ff4444; --bg: #050505; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #f0f0f0; 
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        /* Sabotage Animation */
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-8px, 8px); } 50% { transform: translate(8px, -8px); } }
        .sabotaged { animation: shake 0.1s infinite; background: #330000 !important; }

        #game-container { width: 90%; max-width: 600px; padding: 20px; margin-top: 20px; display: none; }
        
        .stats-bar { display: flex; justify-content: space-between; font-family: monospace; font-size: 1.2rem; color: var(--accent); margin-bottom: 10px; }
        .question-text { font-size: 1.2rem; min-height: 120px; margin-bottom: 20px; line-height: 1.5; color: #fff; }
        
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .option-btn { 
            padding: 18px; background: #1a1a1a; border: 2px solid #333; color: #ccc; 
            border-radius: 8px; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s;
        }
        .option-btn:hover { border-color: var(--accent); color: #fff; }

        #menu-overlay { 
            position: fixed; inset: 0; background: var(--bg); display: flex; 
            flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        .setup-card { background: #111; padding: 40px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        input { 
            padding: 12px; width: 120px; font-size: 1.8rem; text-align: center; 
            background: #000; border: 2px solid #444; color: var(--accent); margin: 15px; border-radius: 8px;
        }
        button.action-btn { 
            padding: 15px 30px; background: transparent; border: 2px solid var(--accent); 
            color: var(--accent); font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 5px;
        }
        button.action-btn:hover { background: var(--accent); color: #000; }

        .timer-track { height: 10px; background: #222; border-radius: 5px; overflow: hidden; margin-bottom: 25px; border: 1px solid #333; }
        .timer-fill { height: 100%; width: 100%; background: var(--accent); transition: width 0.1s linear; }
        
        .room-code-display { font-size: 3rem; color: var(--accent); font-weight: bold; letter-spacing: 5px; margin: 20px 0; }
    </style>
</head>
<body>

<div id="menu-overlay">
    <div class="setup-card">
        <h1 style="color: var(--accent); letter-spacing: 2px;">BG-PROAIR BATTLE</h1>
        <div id="initial-choice">
            <button class="action-btn" onclick="startAsHost()">HOST SESSION</button>
            <p style="color: #555; margin: 15px 0;">- OR -</p>
            <input type="number" id="join-code" placeholder="CODE">
            <button class="action-btn" onclick="startAsJoiner()">JOIN ROOM</button>
        </div>
        <div id="host-display" style="display:none;">
            <p>SHARE THIS CODE WITH OPPONENT:</p>
            <div id="generated-code" class="room-code-display">----</div>
            <p id="status" style="color: #666;">Initializing connection...</p>
        </div>
    </div>
</div>

<div id="game-container">
    <div class="stats-bar">
        <span>STREAK: <span id="streak">0</span>/77</span>
        <span id="timer-txt">20.0s</span>
    </div>
    <div class="timer-track"><div id="timer-fill" class="timer-fill"></div></div>
    <div id="question" class="question-text">Syncing System...</div>
    <div id="options" class="options-grid"></div>
</div>

<script>
// --- FULL 77 STATEMENT DATABASE (Sample Set - Expand as needed) ---
const statements = [
    { s: "A positive pressure leak could be caused by a leakage in or at device components.", k: "leakage", d: ["blockage", "rupture", "contamination"] },
    { s: "The batteries in the electronics assembly should be replaced as necessary.", k: "electronics assembly", d: ["sensor unit", "pressure reducer", "minimum valve"] },
    { s: "Dow Corning 111 is to be used to lubricate O-rings.", k: "Dow Corning 111", d: ["Molykote 111", "White Spirit", "Petroleum Jelly"] },
    { s: "The pressure relief valve is designed to open when the pressure within the breathing circuit is between +40 and +80 millimeters.", k: "+40 and +80", d: ["+10 and +25", "4-8", "58-116"] },
    { s: "The oxygen cylinder burst disc ruptures at 4,450 psi.", k: "4,450 psi", d: ["3,000 psi", "5,000 psi", "2,175 psi"] },
    { s: "The weight of a fully charged BG-ProAir apparatus is 16.9kg.", k: "16.9kg", d: ["20.1kg", "12.5kg", "15.0kg"] },
    { s: "The breathing bag has a 6-liter volume.", k: "6-liter", d: ["4-liter", "10-liter", "2-liter"] },
    { s: "Only DRAGERSORB 400 is to be used to fill the refillable absorber.", k: "DRAGERSORB 400", d: ["DRAGERSORB 800", "Soda Lime", "Carbon Scrub"] }
    // Add all 77 from previous lists here
];

let peer, conn;
let streak = 0;
let deck = [];
let currentQ = null;
let timerRef = null;
let isGameOver = false;

// --- P2P LOGIC ---
function startAsHost() {
    const code = Math.floor(1000 + Math.random() * 9000).toString();
    document.getElementById('initial-choice').style.display = 'none';
    document.getElementById('host-display').style.display = 'block';
    document.getElementById('generated-code').innerText = code;
    
    peer = new Peer('bgpro-' + code);
    peer.on('open', () => document.getElementById('status').innerText = "Awaiting Player 2...");
    peer.on('connection', (c) => {
        conn = c;
        setupNetworkHandlers();
    });
}

function startAsJoiner() {
    const code = document.getElementById('join-code').value;
    if(!code) return alert("Enter code");
    peer = new Peer();
    peer.on('open', () => {
        conn = peer.connect('bgpro-' + code);
        setupNetworkHandlers();
    });
}

function setupNetworkHandlers() {
    conn.on('open', () => {
        document.getElementById('menu-overlay').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        initBattle();
    });
    conn.on('data', (data) => {
        if (data === 'SABOTAGE') triggerSabotageUI();
        if (data.type === 'WINNER') endGame(false, data.reason);
    });
}

// --- GAME LOGIC ---
function initBattle() {
    deck = [...statements].sort(() => Math.random() - 0.5);
    nextQ();
}

function nextQ() {
    if (isGameOver) return;
    if (streak >= 77) {
        conn.send({type: 'WINNER', reason: "Opponent achieved Perfect 77 Streak!"});
        return endGame(true, "CERTIFICATION GRANTED");
    }

    currentQ = deck[Math.floor(Math.random() * deck.length)];
    document.getElementById('question').innerText = currentQ.s.replace(currentQ.k, "__________");
    
    const opts = [...currentQ.d, currentQ.k].sort(() => Math.random() - 0.5);
    const container = document.getElementById('options');
    container.innerHTML = '';
    
    opts.forEach(o => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = o;
        btn.onclick = () => {
            if (o === currentQ.k) {
                streak++;
                document.getElementById('streak').innerText = streak;
                if (streak % 5 === 0) conn.send('SABOTAGE');
                nextQ();
            } else {
                conn.send({type: 'WINNER', reason: "Opponent made a system error!"});
                endGame(false, "INCORRECT SELECTION");
            }
        };
        container.appendChild(btn);
    });
    startTimer();
}

function startTimer() {
    clearInterval(timerRef);
    let time = Math.max(4, 20 - (Math.floor(streak/8)*2.5));
    const total = time;
    
    timerRef = setInterval(() => {
        time -= 0.1;
        document.getElementById('timer-txt').innerText = Math.max(0, time).toFixed(1) + "s";
        document.getElementById('timer-fill').style.width = (time/total * 100) + "%";
        if (time <= 0) {
            clearInterval(timerRef);
            conn.send({type: 'WINNER', reason: "Opponent ran out of oxygen!"});
            endGame(false, "OXYGEN DEPLETED");
        }
    }, 100);
}

function triggerSabotageUI() {
    document.body.classList.add('sabotaged');
    setTimeout(() => document.body.classList.remove('sabotaged'), 4000);
}

function endGame(isWin, reason) {
    isGameOver = true;
    clearInterval(timerRef);
    document.getElementById('game-container').innerHTML = `
        <h1 style="color:${isWin ? 'var(--accent)' : 'var(--danger)'}">${isWin ? 'VICTORY' : 'DEFEAT'}</h1>
        <p style="font-size: 1.2rem;">${reason}</p>
        <p>Final Streak: ${streak}</p>
        <button class="action-btn" onclick="location.reload()">RE-INITIALIZE</button>
    `;
}
</script>
</body>
</html>
